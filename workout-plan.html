<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00A878">
<title>Amanda's Training Plan</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F7;
  --surface:#FFFFFF;
  --surface2:#F6F7FB;
  --surface3:#ECEEF5;
  --border:#E4E6EF;
  --border2:#CDD0DF;

  --green:#00A878;--green-light:#E5F7F2;--green-dark:#007A58;
  --blue:#4361EE;--blue-light:#EEF1FD;
  --orange:#F4831F;--orange-light:#FEF3E8;
  --red:#E63946;--red-light:#FDECEE;
  --cyan:#0096C7;--cyan-light:#E5F4FA;
  --purple:#7B2FBE;--purple-light:#F3E8FA;
  --yellow:#C18A00;--yellow-light:#FDF6E3;

  --text:#111827;--text-muted:#6B7280;--text-dim:#9CA3AF;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;font-size:16px;line-height:1.5;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
/* HEADER */
#header{padding:20px 20px 0;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid transparent;transition:border-color .3s}
#header.scrolled{border-color:var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.phase-chip{background:var(--green-light);color:var(--green-dark);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid rgba(0,168,120,.25)}
.marathon-chip{color:var(--text-muted);font-size:12px;font-weight:500}
.marathon-days{color:var(--orange);font-weight:700}
#header h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
#header .date-line{font-size:13px;color:var(--text-muted);margin-bottom:16px}
/* DAY STRIP */
#day-strip{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
#day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.day-btn:hover{border-color:var(--border2);background:var(--surface2)}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 12px rgba(0,168,120,.3)}
.day-btn.today:not(.active){border-color:var(--green);background:var(--green-light)}
.day-btn.rest-day{opacity:.5}
.day-name{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:inherit}
.day-num{font-size:18px;font-weight:800;color:inherit}
.day-dots{display:flex;gap:2px;height:6px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%}
.dot.run{background:var(--green)}
.dot.bike{background:var(--blue)}
.dot.lift{background:var(--orange)}
.dot.rest{background:transparent}
/* CONTENT */
#content{flex:1;padding:0 16px 100px}
/* SECTION HEADERS */
.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);padding:16px 4px 8px}
/* WORKOUT CARDS */
.workout-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;margin-bottom:12px;overflow:hidden;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.workout-card.expanded{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;user-select:none}
.card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-icon.run-icon{background:var(--green-light)}
.card-icon.bike-icon{background:var(--blue-light)}
.card-icon.lift-icon{background:var(--orange-light)}
.card-meta{flex:1;min-width:0}
.card-title{font-size:16px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:1px}
.card-chevron{color:var(--text-dim);font-size:20px;font-weight:300;transition:transform .2s;flex-shrink:0}
.workout-card.expanded .card-chevron{transform:rotate(90deg)}
.card-body{padding:0 16px 16px;display:none}
.workout-card.expanded .card-body{display:block}
/* PAIN CHECK BANNER */
.pain-banner{background:var(--red-light);border:1.5px solid rgba(230,57,70,.25);border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.pain-banner-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.pain-banner-text h4{font-size:14px;font-weight:700;color:var(--red);margin-bottom:2px}
.pain-banner-text p{font-size:12px;color:var(--text-muted);line-height:1.4}
.pain-inputs{display:flex;gap:8px;margin-top:8px}
.pain-input-group{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;gap:2px}
.pain-input-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.pain-score{font-size:20px;font-weight:800;color:var(--text);cursor:pointer;padding:2px 0}
/* BLOCK SECTION — Runna-style */
.block-section{border-radius:14px;overflow:hidden;margin-bottom:12px}
.block-section-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:12px 12px 0 0}
.block-section-header.clr-blue{background:var(--blue);color:#fff}
.block-section-header.clr-orange{background:var(--orange);color:#fff}
.block-section-header.clr-red{background:var(--red);color:#fff}
.block-section-header.clr-cyan{background:var(--cyan);color:#fff}
.block-section-header.clr-green{background:var(--green);color:#fff}
.block-section-header.clr-purple{background:var(--purple);color:#fff}
.block-section-header.clr-gray{background:var(--surface3);color:var(--text-muted)}
.block-part-name{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.block-repeat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.25);backdrop-filter:blur(4px)}
.block-repeat-badge.dark{background:rgba(0,0,0,.08);color:var(--text-muted)}
.block-section-body{background:var(--surface2);border-radius:0 0 12px 12px;padding:8px}
.block-desc{font-size:12px;color:var(--text-muted);padding:8px 4px 4px;line-height:1.4;font-style:italic}
/* EXERCISE ROW — Runna style */
.exercise-list{display:flex;flex-direction:column;gap:6px}
.exercise-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:10px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ex-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.ex-icon-wrap.cat-pt{background:var(--red-light)}
.ex-icon-wrap.cat-lower{background:var(--orange-light)}
.ex-icon-wrap.cat-upper{background:var(--blue-light)}
.ex-icon-wrap.cat-core{background:var(--cyan-light)}
.ex-icon-wrap.cat-mob{background:var(--purple-light)}
.ex-icon-wrap.cat-full{background:var(--yellow-light)}
.ex-icon-wrap svg{width:32px;height:32px}
.ex-icon-wrap.cat-pt svg{color:var(--red)}
.ex-icon-wrap.cat-lower svg{color:var(--orange)}
.ex-icon-wrap.cat-upper svg{color:var(--blue)}
.ex-icon-wrap.cat-core svg{color:var(--cyan)}
.ex-icon-wrap.cat-mob svg{color:var(--purple)}
.ex-icon-wrap.cat-full svg{color:var(--yellow)}
.exercise-info{flex:1;min-width:0}
.exercise-name{font-size:14px;font-weight:600;letter-spacing:-.1px;color:var(--text)}
.exercise-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.ex-muscle-tag{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.exercise-detail{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.exercise-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.exercise-check.done{background:var(--green);border-color:var(--green);color:#fff}
.exercise-check svg{width:13px;height:13px;opacity:0;transition:opacity .15s}
.exercise-check.done svg{opacity:1}
/* COACHING CUE */
.cue-text{font-size:12px;color:#3D9A76;font-style:italic;padding:4px 0 0;line-height:1.4;border-left:2px solid var(--green-light);padding-left:8px;margin-top:4px}
.cue-text.cue-warning{color:var(--red);border-left-color:var(--red-light)}
/* RUN DETAIL */
.run-detail{background:var(--green-light);border-radius:12px;padding:14px;margin-top:12px;border:1px solid rgba(0,168,120,.15)}
.run-detail h4{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--green-dark)}
.run-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(0,168,120,.15)}
.run-row:last-child{border-bottom:none}
.run-key{font-size:12px;color:var(--text-muted)}
.run-val{font-size:13px;font-weight:600;color:var(--text)}
.pain-zone-guide{margin-top:12px;display:flex;flex-direction:column;gap:4px}
.pain-zone{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px}
.pz-green{background:var(--green-light)}
.pz-yellow{background:#FEF9E5}
.pz-orange{background:var(--orange-light)}
.pz-red{background:var(--red-light)}
.pz-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pz-green .pz-dot{background:var(--green)}
.pz-yellow .pz-dot{background:#D4A017}
.pz-orange .pz-dot{background:var(--orange)}
.pz-red .pz-dot{background:var(--red)}
.pz-text{font-size:11px;flex:1;color:var(--text-muted)}
.pz-text strong{color:var(--text);font-weight:700}
/* BIKE DETAIL */
.bike-detail{background:var(--blue-light);border-radius:12px;padding:14px;margin-top:12px;border:1px solid rgba(67,97,238,.15)}
.bike-detail h4{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--blue)}
/* COMPLETE BUTTON */
.complete-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;letter-spacing:.3px;cursor:pointer;margin-top:14px;transition:all .15s}
.complete-btn.done{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(0,168,120,.25)}
.complete-btn.not-done{background:var(--surface3);color:var(--text-muted);border:1.5px solid var(--border)}
/* WORKOUT TIMER */
.workout-timer-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.wtimer-icon{font-size:26px;flex-shrink:0}
.wtimer-info{flex:1}
.wtimer-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:1px}
.wtimer-time{font-size:26px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1}
.wtimer-running .wtimer-time{color:var(--green)}
.wtimer-btns{display:flex;gap:6px;flex-shrink:0}
.wtimer-btn{padding:7px 13px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.wtimer-btn.start{background:var(--green);color:#fff}
.wtimer-btn.pause{background:var(--orange);color:#fff}
.wtimer-btn.reset{background:var(--surface3);color:var(--text-muted);border:1.5px solid var(--border)}
/* SET TIMER */
.set-timer-btn{display:inline-flex;align-items:center;padding:2px 6px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;cursor:pointer;font-family:inherit;margin-left:4px;vertical-align:middle;transition:all .15s}
.set-timer-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.set-timer-popup{display:none;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;margin-top:8px;align-items:center;gap:10px}
.set-timer-popup.visible{display:flex}
.set-timer-countdown{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);min-width:36px}
.set-timer-countdown.done{color:var(--green)}
.set-timer-countdown.low{color:var(--orange)}
.set-timer-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.set-timer-bar{height:100%;background:var(--green);border-radius:4px;transition:width .5s linear}
.set-timer-bar.low{background:var(--orange)}
.set-cancel-btn{padding:3px 9px;border-radius:6px;border:none;background:var(--surface3);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
/* PHASE PROGRESS */
.phase-progress{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.phase-progress h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.phase-list{display:flex;flex-direction:column;gap:8px}
.phase-item{display:flex;align-items:center;gap:10px}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-item.complete .phase-dot{background:var(--green)}
.phase-item.active .phase-dot{background:var(--orange);box-shadow:0 0 6px rgba(244,131,31,.5)}
.phase-item.upcoming .phase-dot{background:var(--border2)}
.phase-text{flex:1}
.phase-name{font-size:13px;font-weight:600;color:var(--text)}
.phase-dates{font-size:11px;color:var(--text-muted)}
.phase-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:4px;position:relative;overflow:hidden}
.phase-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),#FFAA44);border-radius:4px;transition:width .5s}
.phase-pct{font-size:11px;font-weight:700;color:var(--orange);width:32px;text-align:right;flex-shrink:0}
/* REST DAY */
.rest-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.rest-emoji{font-size:48px;margin-bottom:12px}
.rest-card h3{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--text)}
.rest-card p{font-size:14px;color:var(--text-muted);line-height:1.5}
/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--text-dim);transition:color .15s;border:none;background:none;font-family:inherit}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.3px}
/* VIEWS */
.view{display:none}
.view.active{display:block}
/* PLAN VIEW */
.plan-week{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.plan-week-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer}
.plan-week-title{font-size:15px;font-weight:700;color:var(--text)}
.plan-week-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px}
.status-complete{background:var(--green-light);color:var(--green-dark)}
.status-active{background:var(--orange-light);color:var(--orange)}
.status-upcoming{background:var(--surface3);color:var(--text-muted)}
.plan-week-body{padding:12px 16px;display:none}
.plan-week.expanded .plan-week-body{display:block}
.plan-day-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.plan-day-row:last-child{border-bottom:none}
.plan-day-name{width:32px;color:var(--text-muted);font-weight:600;flex-shrink:0}
.plan-day-workout{flex:1;color:var(--text)}
.plan-day-type{display:flex;gap:4px;flex-shrink:0}
.type-tag{font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.tag-run{background:var(--green-light);color:var(--green-dark)}
.tag-bike{background:var(--blue-light);color:var(--blue)}
.tag-lift{background:var(--orange-light);color:var(--orange)}
.tag-rest{background:var(--surface3);color:var(--text-dim)}
/* NOTIFICATION DOT */
.notif{width:7px;height:7px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:12px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div class="phase-chip" id="phase-chip">Phase 1 · Volume</div>
      <div class="marathon-chip">NYC <span class="marathon-days" id="marathon-days">167</span>d away</div>
    </div>
    <h1>Amanda's Plan</h1>
    <div class="date-line" id="date-line">Today</div>
  </div>

  <div id="day-strip"></div>

  <div id="content">
    <div id="view-today" class="view active"></div>
    <div id="view-plan" class="view"></div>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" onclick="switchView('today')" id="nav-today">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">TODAY</span>
    </button>
    <button class="nav-btn" onclick="switchView('plan')" id="nav-plan">
      <span class="nav-icon">📅</span>
      <span class="nav-label">PLAN</span>
    </button>
  </nav>
</div>

<script>
/* ─── EXERCISE SVG ICONS ─── */
const EXERCISE_SVGS = {
  'run': `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="26" cy="7" r="3.5" fill="currentColor" stroke="none"/><line x1="24" y1="11" x2="20" y2="22"/><line x1="22" y1="15" x2="30" y2="20"/><line x1="22" y1="15" x2="14" y2="10"/><line x1="20" y1="22" x2="26" y2="16"/><line x1="26" y1="16" x2="33" y2="26"/><line x1="20" y1="22" x2="13" y2="32"/><line x1="13" y1="32" x2="9" y2="37"/></svg>`,

  'bike': `<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="30" r="6"/><circle cx="31" cy="30" r="6"/><line x1="9" y1="30" x2="20" y2="20"/><line x1="20" y1="20" x2="31" y2="30"/><line x1="20" y1="20" x2="15" y2="24"/><line x1="31" y1="30" x2="31" y2="19"/><line x1="29" y1="19" x2="34" y2="19"/><circle cx="26" cy="12" r="3.5" fill="currentColor" stroke="none"/><line x1="26" y1="16" x2="20" y2="20"/><line x1="26" y1="16" x2="32" y2="19"/></svg>`,

function dateStr(d){return d.toISOString().split('T')[0]}
function formatDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function dayDiff(a,b){return Math.round((b-a)/(1000*60*60*24))}
function getCurrentPhase(){
  const ds=dateStr(today);
  for(const p of PHASES){if(ds>=p.start&&ds<=p.end)return p;}
  return PHASES[PHASES.length-1];
}
function getPhaseProgress(){
  const phase=getCurrentPhase();
  if(!phase||phase.status==='upcoming')return 0;
  const start=new Date(phase.start+'T00:00:00');
  const end=new Date(phase.end+'T00:00:00');
  const total=end-start;
  const elapsed=today-start;
  return Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
}
function getWeekLabel(d){
  const ds=dateStr(d);
  if(ds>='2026-05-04'&&ds<'2026-06-15')return 'Phase 1 · Volume Build';
  if(ds>='2026-06-15'&&ds<'2026-08-03')return 'Phase 2 · Intensity Build';
  if(ds>='2026-08-03'&&ds<'2026-10-12')return 'Phase 3 · Marathon Specific';
  if(ds>='2026-10-12'&&ds<'2026-11-02')return 'Phase 4 · Taper';
  if(ds>='2026-11-01')return 'NYC Marathon 2026';
  return 'NYC Marathon Training';
}

/* ─── TIMERS ─── */
let wTimerInterval=null,wTimerSeconds=0,wTimerRunning=false;
const setTimers={};
function wTimerFmt(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function wTimerToggle(){
  if(wTimerRunning){
    clearInterval(wTimerInterval);wTimerRunning=false;
  }else{
    wTimerInterval=setInterval(()=>{
      wTimerSeconds++;
      const el=document.getElementById('wtimer-display');
      if(el)el.textContent=wTimerFmt(wTimerSeconds);
    },1000);
    wTimerRunning=true;
  }
  const card=document.getElementById('workout-timer-card');
  if(card)card.classList.toggle('wtimer-running',wTimerRunning);
  const btn=document.getElementById('wtimer-toggle-btn');
  if(btn){btn.textContent=wTimerRunning?'Pause':'Start';btn.className='wtimer-btn '+(wTimerRunning?'pause':'start');}
}
function wTimerReset(){
  clearInterval(wTimerInterval);wTimerRunning=false;wTimerSeconds=0;
  const el=document.getElementById('wtimer-display');if(el)el.textContent='00:00';
  const card=document.getElementById('workout-timer-card');if(card)card.classList.remove('wtimer-running');
  const btn=document.getElementById('wtimer-toggle-btn');if(btn){btn.textContent='Start';btn.className='wtimer-btn start';}
}
function restoreWorkoutTimerState(){
  const el=document.getElementById('wtimer-display');if(!el)return;
  el.textContent=wTimerFmt(wTimerSeconds);
  const card=document.getElementById('workout-timer-card');if(card)card.classList.toggle('wtimer-running',wTimerRunning);
  const btn=document.getElementById('wtimer-toggle-btn');
  if(btn){btn.textContent=wTimerRunning?'Pause':'Start';btn.className='wtimer-btn '+(wTimerRunning?'pause':'start');}
}
function renderWorkoutTimer(){
  return `<div class="workout-timer-card" id="workout-timer-card">
    <div class="wtimer-icon">⏱</div>
    <div class="wtimer-info">
      <div class="wtimer-label">Workout Timer</div>
      <div class="wtimer-time" id="wtimer-display">00:00</div>
    </div>
    <div class="wtimer-btns">
      <button class="wtimer-btn start" id="wtimer-toggle-btn" onclick="wTimerToggle()">Start</button>
      <button class="wtimer-btn reset" onclick="wTimerReset()">Reset</button>
    </div>
  </div>`;
}
function parseSetDuration(reps){
  const m=(reps||'').match(/(\d+)\s*(?:sec(?:onds?)?|s(?=\/|\s|$))/i);
  return m?parseInt(m[1],10):null;
}
function startSetTimer(key,seconds){
  if(setTimers[key]&&setTimers[key].interval)clearInterval(setTimers[key].interval);
  setTimers[key]={total:seconds,remaining:seconds,interval:null};
  const popup=document.getElementById('stp-'+key);const btn=document.getElementById('stb-'+key);
  if(popup)popup.classList.add('visible');if(btn)btn.classList.add('active');
  updateSetTimerDisplay(key);
  setTimers[key].interval=setInterval(()=>{
    setTimers[key].remaining--;
    updateSetTimerDisplay(key);
    if(setTimers[key].remaining<=0){
      clearInterval(setTimers[key].interval);setTimers[key].interval=null;
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      const cd=document.getElementById('stc-'+key);if(cd){cd.textContent='Done!';cd.className='set-timer-countdown done';}
      const b=document.getElementById('stb-'+key);if(b){b.textContent='⏱';b.classList.remove('active');}
    }
  },1000);
}
function updateSetTimerDisplay(key){
  const t=setTimers[key];if(!t)return;
  const cd=document.getElementById('stc-'+key);const bar=document.getElementById('stbar-'+key);
  const pct=t.remaining/t.total*100;
  if(cd){cd.textContent=t.remaining+'s';cd.className='set-timer-countdown'+(t.remaining<=5?' low':'');}
  if(bar){bar.style.width=pct+'%';bar.className='set-timer-bar'+(t.remaining<=5?' low':'');}
}
function cancelSetTimer(key){
  if(setTimers[key]&&setTimers[key].interval)clearInterval(setTimers[key].interval);
  delete setTimers[key];
  const popup=document.getElementById('stp-'+key);const btn=document.getElementById('stb-'+key);
  if(popup)popup.classList.remove('visible');
  if(btn){btn.textContent='⏱';btn.classList.remove('active');}
}

/* ─── RENDER ─── */
function renderHeader(){
  const phase=getCurrentPhase();
  const phaseLabel=phase?`Phase ${phase.id} · ${phase.shortName}`:'NYC Training';
  document.getElementById('phase-chip').textContent=phaseLabel;
  document.getElementById('marathon-days').textContent=dayDiff(today,MARATHON_DATE);
  const isToday=dateStr(selectedDate)===dateStr(today);
  document.getElementById('date-line').textContent=isToday?
    'Today · '+today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):
    formatDate(selectedDate);
}

function renderDayStrip(){
  const strip=document.getElementById('day-strip');
  strip.innerHTML='';
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const startDay=new Date(today);
  startDay.setDate(startDay.getDate()-3);
  for(let i=0;i<14;i++){
    const d=new Date(startDay);
    d.setDate(startDay.getDate()+i);
    const dow=d.getDay();
    const config=DAY_CONFIG[dow];
    const ds=dateStr(d);
    const isToday=ds===dateStr(today);
    const isSelected=ds===dateStr(selectedDate);
    const btn=document.createElement('div');
    btn.className='day-btn'+(isSelected?' active':'')+(isToday&&!isSelected?' today':'')+(config.type==='recovery'?' rest-day':'');
    let dots='';
    if(config.type==='recovery'){dots='<div class="dot rest"></div>';}
    else if(config.type==='long_run'){dots='<div class="dot run"></div>';}
    else if(config.type==='legs_xt'){dots='<div class="dot lift"></div><div class="dot bike"></div>';}
    else{dots='<div class="dot run"></div><div class="dot lift"></div>';}
    btn.innerHTML=`<span class="day-name">${days[dow]}</span><span class="day-num">${d.getDate()}</span><div class="day-dots">${dots}</div>`;
    btn.onclick=()=>selectDay(d);
    strip.appendChild(btn);
  }
  setTimeout(()=>{
    const active=strip.querySelector('.active,.today');
    if(active)active.scrollIntoView({inline:'center',behavior:'smooth'});
  },50);
}

function selectDay(d){
  selectedDate=new Date(d);
  selectedDate.setHours(0,0,0,0);
  renderDayStrip();
  renderHeader();
  renderTodayView();
}

function catClass(cat){
  // cat comes as 'ex-pt', 'ex-lower', etc — strip 'ex-' for icon wrap class
  return 'cat-'+cat.replace('ex-','');
}

function renderExercise(ex, workoutKey, blockIdx, exIdx, isWarmup=false){
  const key=`${workoutKey}_${isWarmup?'w':blockIdx}_${exIdx}`;
  const done=completedExercises[key]||false;
  const icon=getExIcon(ex.code,ex.cat);
  const detail=`${isWarmup?'':ex.sets+'× '}${ex.reps}${ex.rest&&ex.rest!=='—'?' · Rest '+ex.rest:''}`;
  const isWarning=ex.cue&&ex.cue.startsWith('⚠️');
  const secs=parseSetDuration(ex.reps);
  const timerBtn=secs?`<button class="set-timer-btn" id="stb-${key}" onclick="startSetTimer('${key}',${secs})">⏱</button>`:'';
  const timerPopup=secs?`<div class="set-timer-popup" id="stp-${key}">
      <div class="set-timer-countdown" id="stc-${key}">${secs}s</div>
      <div class="set-timer-bar-wrap"><div class="set-timer-bar" id="stbar-${key}" style="width:100%"></div></div>
      <button class="set-cancel-btn" onclick="cancelSetTimer('${key}')">✕</button>
    </div>`:'';
  return `
  <div class="exercise-row" id="ex-${key}">
    <div class="ex-icon-wrap ${catClass(ex.cat)}">${icon}</div>
    <div class="exercise-info">
      <div class="exercise-name">${ex.name}${timerBtn}</div>
      <div class="exercise-detail">${detail}</div>
      ${ex.cue?`<div class="cue-text ${isWarning?'cue-warning':''}">${ex.cue}</div>`:''}
      ${timerPopup}
    </div>
    <div class="exercise-check ${done?'done':''}" onclick="toggleEx('${key}',this)">${checkMark()}</div>
  </div>`;
}

function renderLiftCard(liftKey, dateStr_val){
  const lift=LIFTS[liftKey];
  const workoutKey=`${dateStr_val}_${liftKey}`;

  let warmupHtml='';
  if(lift.warmup&&lift.warmup.length){

      </div>

    lift.warmup.forEach((ex,i)=>{warmupHtml+=renderExercise(ex,workoutKey,-1,i,true);});

  }

  let blocksHtml='';
  lift.blocks.forEach((block,bi)=>{
    blocksHtml+=`

function runTypeLabel(type){
  if(type==='tempo')return 'Tempo Run';
  if(type==='track')return 'Track Session';
  if(type==='long')return 'Long Run';
  if(type==='long_mp')return 'Long Run + MP';
  if(type==='race')return 'NYC MARATHON';
  return 'Zone 2 Run';
}
function runTypeColor(type){
  if(type==='tempo')return '#F4831F';
  if(type==='track')return '#E63946';
  if(type==='long'||type==='long_mp')return '#7B2FBE';
  if(type==='race')return '#00A878';
  return '#00A878';
}

      <p>Easy swim, yoga, or Pilates + walk 30 min. ~1.5–2 hrs. Sunday is non-negotiable rest from structured training. Bone remodeling is most active during rest and sleep.</p>

  }else if(config.type==='long_run'){

    html+=renderWorkoutTimer();

      html+=`<div class="rest-card"><div class="rest-emoji">💤</div><h3>${run.label}</h3><p>${run.notes}</p></div>`;

    const status=wkStatus(w.start,w.end);
    const id=`plan-week-${wi}`;
    html+=`<div class="plan-week ${status==='active'?'expanded':''}" id="${id}">
      <div class="plan-week-header" onclick="togglePlanWeek('${id}')">
        <span class="plan-week-title">${w.label} <span style="font-weight:400;color:var(--text-muted);font-size:12px">${w.dates}</span></span>
        <span class="plan-week-status status-${status}">${status==='active'?'Current':status==='complete'?'Done ✓':'Upcoming'}</span>
      </div>
      <div class="plan-week-body">
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${w.phase}</p>
        <div class="run-detail">
          <h4>Run Workouts</h4>
          <div class="run-row"><span class="run-key">Mon / Fri</span><span class="run-val" style="font-size:12px">${w.monWed}</span></div>
          <div class="run-row"><span class="run-key">Wed</span><span class="run-val" style="font-size:12px">${w.monWed}${w.wedNote?' — '+w.wedNote:''}</span></div>
          <div class="run-row"><span class="run-key">Sat</span><span class="run-val" style="font-size:12px">${w.sat}</span></div>
          <div class="run-row"><span class="run-key">Total Run</span><span class="run-val" style="font-size:12px">${w.runMin} min</span></div>
        </div>
        <p style="font-size:12px;color:var(--text-muted);margin-top:10px">Tue + Thu: Lower body heavy 60 min + XT 90 min. Mon/Wed/Fri: upper body 30 min after run. Femoral neck protocol every Tue + Thu.</p>
      </div>
    </div>`;
  });

  html+=`<div class="section-label">Key Principles</div>
  <div class="workout-card" style="margin-bottom:12px">
    <div class="card-body" style="display:block;padding:16px">
      ${[
        'Volume only in Phase 1 (no intensity), intensity only in Phase 2 (volume locked at 246 min). Never both at once.',
        'Pass each duration twice clean before progressing. If a week feels hard, repeat it.',
        'Femoral neck protocol every Tue + Thu. Non-negotiable for bone health.',
        'Ammonia smell during training = eat more carbs. Fueling is non-negotiable.',
        'Legs will feel heavy during taper (Wks 30–31) — this is normal. Do not add anything.',
        'DEXA scan before Spring 2027. Calcium + Vit D daily.',
        'NYC 2026: 65–70 km peak. Spring 2027: 80 km. Fall 2027: 95 km.',
      ].map(c=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-muted);line-height:1.4"><span style="color:var(--green);flex-shrink:0">→</span>${c}</div>`).join('')}
    </div>
  </div>`;

  view.innerHTML=html;
}

/* ─── EVENTS ─── */
function toggleCard(id){const c=document.getElementById(id);if(c)c.classList.toggle('expanded');}
function togglePlanWeek(id){const e=document.getElementById(id);if(e)e.classList.toggle('expanded');}
function toggleEx(key,el){
  completedExercises[key]=!completedExercises[key];
  localStorage.setItem('completed',JSON.stringify(completedExercises));
  el.classList.toggle('done',completedExercises[key]);
}
function toggleWorkout(key,btn){
  completedWorkouts[key]=!completedWorkouts[key];
  localStorage.setItem('completedWorkouts',JSON.stringify(completedWorkouts));
  const done=completedWorkouts[key];
  btn.className='complete-btn '+(done?'done':'not-done');
  btn.textContent=done?'✓ Completed':'Mark Complete';
}
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
}

/* ─── INIT ─── */
function init(){
  renderHeader();
  renderDayStrip();
  renderTodayView();
  renderPlanView();
  window.addEventListener('scroll',()=>{
    document.getElementById('header').classList.toggle('scrolled',window.scrollY>10);
  });
}
init();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
