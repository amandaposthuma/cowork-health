<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7D9B76">
<title>Amanda's Training Plan</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF8F5;
  --surface:#FFFFFF;
  --surface2:#F5F1EC;
  --surface3:#EDE8E1;
  --border:#E5DDD4;
  --border2:#CEC4B8;

  --green:#7D9B76;--green-light:#EEF3ED;--green-dark:#4E6B49;
  --blue:#7A8FA6;--blue-light:#ECF1F5;
  --orange:#B8785A;--orange-light:#F6EDE7;
  --red:#C47878;--red-light:#F6ECEC;
  --cyan:#6E9E9E;--cyan-light:#EAF1F1;
  --purple:#9B8BA8;--purple-light:#F0ECEF;
  --yellow:#B09060;--yellow-light:#F2EAE0;

  --text:#1A1814;--text-muted:#8A7F74;--text-dim:#B5ADA5;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;font-size:16px;line-height:1.5;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
/* HEADER */
#header{padding:20px 20px 0;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid transparent;transition:border-color .3s}
#header.scrolled{border-color:var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.phase-chip{background:var(--green-light);color:var(--green-dark);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1px solid rgba(125,155,118,.2)}
.marathon-chip{color:var(--text-muted);font-size:12px;font-weight:500}
.marathon-days{color:var(--orange);font-weight:700}
#header h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
#header .date-line{font-size:13px;color:var(--text-muted);margin-bottom:16px}
/* DAY STRIP */
#day-strip{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
#day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.day-btn:hover{border-color:var(--border2);background:var(--surface2)}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 4px 12px rgba(125,155,118,.3)}
.day-btn.today:not(.active){border-color:var(--green);background:var(--green-light)}
.day-btn.rest-day{opacity:.5}
.day-name{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:inherit}
.day-num{font-size:18px;font-weight:800;color:inherit}
.day-dots{display:flex;gap:2px;height:6px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%}
.dot.run{background:var(--green)}
.dot.bike{background:var(--blue)}
.dot.lift{background:var(--orange)}
.dot.rest{background:transparent}
/* CONTENT */
#content{flex:1;padding:0 16px 100px}
/* SECTION HEADERS */
.section-label{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim);padding:16px 4px 8px}
/* WORKOUT CARDS */
.workout-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:12px;overflow:hidden;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.workout-card.expanded{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;user-select:none}
.card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-icon.run-icon{background:var(--green-light)}
.card-icon.bike-icon{background:var(--blue-light)}
.card-icon.lift-icon{background:var(--orange-light)}
.card-meta{flex:1;min-width:0}
.card-title{font-size:16px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.card-sub{font-size:13px;color:var(--text-muted);margin-top:1px}
.card-chevron{color:var(--text-dim);font-size:20px;font-weight:300;transition:transform .2s;flex-shrink:0}
.workout-card.expanded .card-chevron{transform:rotate(90deg)}
.card-body{padding:0 16px 16px;display:none}
.workout-card.expanded .card-body{display:block}
/* PAIN CHECK BANNER */
.pain-banner{background:var(--red-light);border:1.5px solid rgba(230,57,70,.25);border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.pain-banner-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.pain-banner-text h4{font-size:14px;font-weight:700;color:var(--red);margin-bottom:2px}
.pain-banner-text p{font-size:12px;color:var(--text-muted);line-height:1.4}
.pain-inputs{display:flex;gap:8px;margin-top:8px}
.pain-input-group{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;gap:2px}
.pain-input-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.pain-score{font-size:20px;font-weight:800;color:var(--text);cursor:pointer;padding:2px 0}
/* BLOCK SECTION — clean girl */
.block-section{border-radius:16px;overflow:hidden;margin-bottom:12px}
.block-section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#2A2520;color:#fff}
.block-section-header.clr-green{background:#4A6B45}
.block-section-header.clr-red{background:#9B5A5A}
.block-section-header.clr-gray{background:var(--surface3);color:var(--text-muted)}
.block-section-header.clr-blue,.block-section-header.clr-orange,.block-section-header.clr-cyan,.block-section-header.clr-purple{background:#2A2520}
.block-header-meta{flex:1;min-width:0}
.block-part-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);display:block;margin-bottom:2px}
.block-section-header.clr-gray .block-part-label{color:var(--text-dim)}
.block-part-name{font-size:13px;font-weight:800;color:#fff;display:block}
.block-section-header.clr-gray .block-part-name{color:var(--text-muted)}
.block-repeat-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff;flex-shrink:0}
.block-section-header.clr-gray .block-repeat-badge{background:rgba(0,0,0,.06);color:var(--text-muted)}
.block-section-body{background:var(--surface2);border-radius:0 0 16px 16px;padding:10px}
.block-desc{font-size:12px;color:var(--text-muted);padding:4px 2px 8px;line-height:1.5}
/* EXERCISE ROW — Runna style */
.exercise-list{display:flex;flex-direction:column;gap:6px}
.exercise-row{display:flex;align-items:center;gap:12px;padding:14px 14px 14px 16px;background:var(--surface);border-radius:10px;border:1px solid var(--border);border-left:3px solid var(--border2);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.exercise-row.cat-pt{border-left-color:var(--red)}
.exercise-row.cat-lower{border-left-color:var(--orange)}
.exercise-row.cat-upper{border-left-color:var(--blue)}
.exercise-row.cat-core{border-left-color:var(--cyan)}
.exercise-row.cat-mob{border-left-color:var(--purple)}
.exercise-row.cat-full{border-left-color:var(--yellow)}
.exercise-info{flex:1;min-width:0}
.exercise-name{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.exercise-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.ex-muscle-tag{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.exercise-detail{font-size:14px;font-weight:800;color:var(--text);margin-top:3px;letter-spacing:-.2px}
.exercise-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.exercise-check.done{background:var(--green);border-color:var(--green);color:#fff}
.exercise-check svg{width:13px;height:13px;opacity:0;transition:opacity .15s}
.exercise-check.done svg{opacity:1}
/* COACHING CUE */
.cue-text{font-size:12px;color:var(--green-dark);font-style:italic;padding:4px 0 0;line-height:1.4;border-left:2px solid var(--green-light);padding-left:8px;margin-top:4px}
.cue-text.cue-warning{color:var(--red);border-left-color:var(--red-light)}
/* RUN DETAIL */
.run-detail{background:var(--green-light);border-radius:14px;padding:14px;margin-top:12px;border:1px solid rgba(125,155,118,.15)}
.run-detail h4{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--green-dark)}
.run-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(0,168,120,.15)}
.run-row:last-child{border-bottom:none}
.run-key{font-size:12px;color:var(--text-muted)}
.run-val{font-size:13px;font-weight:600;color:var(--text)}
.pain-zone-guide{margin-top:12px;display:flex;flex-direction:column;gap:4px}
.pain-zone{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px}
.pz-green{background:var(--green-light)}
.pz-yellow{background:#FEF9E5}
.pz-orange{background:var(--orange-light)}
.pz-red{background:var(--red-light)}
.pz-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pz-green .pz-dot{background:var(--green)}
.pz-yellow .pz-dot{background:#D4A017}
.pz-orange .pz-dot{background:var(--orange)}
.pz-red .pz-dot{background:var(--red)}
.pz-text{font-size:11px;flex:1;color:var(--text-muted)}
.pz-text strong{color:var(--text);font-weight:700}
/* BIKE DETAIL */
.bike-detail{background:var(--blue-light);border-radius:12px;padding:14px;margin-top:12px;border:1px solid rgba(67,97,238,.15)}
.bike-detail h4{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--blue)}
/* COMPLETE BUTTON */
.complete-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;letter-spacing:.3px;cursor:pointer;margin-top:14px;transition:all .15s}
.complete-btn.done{background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(125,155,118,.25)}
.complete-btn.not-done{background:var(--surface3);color:var(--text-muted);border:1.5px solid var(--border)}
/* WORKOUT TIMER */
.workout-timer-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.wtimer-icon{font-size:26px;flex-shrink:0}
.wtimer-info{flex:1}
.wtimer-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:1px}
.wtimer-time{font-size:26px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1}
.wtimer-running .wtimer-time{color:var(--green)}
.wtimer-btns{display:flex;gap:6px;flex-shrink:0}
.wtimer-btn{padding:7px 13px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.wtimer-btn.start{background:var(--green);color:#fff}
.wtimer-btn.pause{background:var(--orange);color:#fff}
.wtimer-btn.reset{background:var(--surface3);color:var(--text-muted);border:1.5px solid var(--border)}
/* SET TIMER */
.set-timer-btn{display:inline-flex;align-items:center;padding:2px 6px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:11px;cursor:pointer;font-family:inherit;margin-left:4px;vertical-align:middle;transition:all .15s}
.set-timer-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.set-timer-popup{display:none;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;margin-top:8px;align-items:center;gap:10px}
.set-timer-popup.visible{display:flex}
.set-timer-countdown{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text);min-width:36px}
.set-timer-countdown.done{color:var(--green)}
.set-timer-countdown.low{color:var(--orange)}
.set-timer-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.set-timer-bar{height:100%;background:var(--green);border-radius:4px;transition:width .5s linear}
.set-timer-bar.low{background:var(--orange)}
.set-cancel-btn{padding:3px 9px;border-radius:6px;border:none;background:var(--surface3);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
/* PHASE PROGRESS */
.phase-progress{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.phase-progress h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.phase-list{display:flex;flex-direction:column;gap:8px}
.phase-item{display:flex;align-items:center;gap:10px}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-item.complete .phase-dot{background:var(--green)}
.phase-item.active .phase-dot{background:var(--orange);box-shadow:0 0 6px rgba(184,120,90,.4)}
.phase-item.upcoming .phase-dot{background:var(--border2)}
.phase-text{flex:1}
.phase-name{font-size:13px;font-weight:600;color:var(--text)}
.phase-dates{font-size:11px;color:var(--text-muted)}
.phase-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:4px;position:relative;overflow:hidden}
.phase-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),#FFAA44);border-radius:4px;transition:width .5s}
.phase-pct{font-size:11px;font-weight:700;color:var(--orange);width:32px;text-align:right;flex-shrink:0}
/* REST DAY */
.rest-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.rest-emoji{font-size:48px;margin-bottom:12px}
.rest-card h3{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--text)}
.rest-card p{font-size:14px;color:var(--text-muted);line-height:1.5}
/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--text-dim);transition:color .15s;border:none;background:none;font-family:inherit}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.3px}
/* VIEWS */
.view{display:none}
.view.active{display:block}
/* PLAN VIEW */
.plan-week{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.plan-week-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer}
.plan-week-title{font-size:15px;font-weight:700;color:var(--text)}
.plan-week-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px}
.status-complete{background:var(--green-light);color:var(--green-dark)}
.status-active{background:var(--orange-light);color:var(--orange)}
.status-upcoming{background:var(--surface3);color:var(--text-muted)}
.plan-week-body{padding:12px 16px;display:none}
.plan-week.expanded .plan-week-body{display:block}
.plan-day-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.plan-day-row:last-child{border-bottom:none}
.plan-day-name{width:32px;color:var(--text-muted);font-weight:600;flex-shrink:0}
.plan-day-workout{flex:1;color:var(--text)}
.plan-day-type{display:flex;gap:4px;flex-shrink:0}
.type-tag{font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.tag-run{background:var(--green-light);color:var(--green-dark)}
.tag-bike{background:var(--blue-light);color:var(--blue)}
.tag-lift{background:var(--orange-light);color:var(--orange)}
.tag-rest{background:var(--surface3);color:var(--text-dim)}
/* NOTIFICATION DOT */
.notif{width:7px;height:7px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:12px}
/* AI COACH FAB */
.ai-fab{position:fixed;bottom:84px;right:16px;background:#2A2520;color:#fff;border:none;border-radius:24px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(42,37,32,.22);z-index:300;letter-spacing:.3px;transition:transform .2s,box-shadow .2s;max-width:calc(480px - 32px)}
.ai-fab:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(42,37,32,.28)}
/* AI CHAT PANEL */
.ai-panel{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-width:480px;left:50%;margin-left:-240px}
@media(max-width:480px){.ai-panel{left:0;margin-left:0}}
.ai-panel.open{transform:translateY(0)}
.ai-panel-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;background:var(--surface);flex-shrink:0}
.ai-panel-title{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.ai-panel-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.ai-panel-close{background:var(--surface3);border:none;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.ai-msg{max-width:86%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.55}
.ai-msg-user{align-self:flex-end;background:#2A2520;color:#fff;border-radius:18px 18px 4px 18px}
.ai-msg-ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px;white-space:pre-wrap}
.ai-thinking{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:13px 16px;display:flex;gap:5px;align-items:center}
.ai-thinking span{width:6px;height:6px;background:var(--text-dim);border-radius:50%;animation:aibounce .9s infinite}
.ai-thinking span:nth-child(2){animation-delay:.15s}
.ai-thinking span:nth-child(3){animation-delay:.3s}
@keyframes aibounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.ai-key-setup{padding:24px 20px;display:none;flex-direction:column;gap:14px}
.ai-key-setup p{font-size:14px;color:var(--text);line-height:1.55}
.ai-key-input{padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;width:100%}
.ai-key-input:focus{border-color:var(--green)}
.ai-key-btn{padding:13px;background:#2A2520;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.ai-key-note{font-size:11px;color:var(--text-dim);line-height:1.5}
.ai-input-row{display:flex;gap:10px;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.ai-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none}
.ai-input:focus{border-color:var(--green);background:var(--surface)}
.ai-send-btn{width:44px;height:44px;border-radius:50%;background:#2A2520;border:none;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.ai-send-btn:disabled{opacity:.35}
.ai-welcome{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px;padding:16px;font-size:14px;line-height:1.6;max-width:92%}
.ai-welcome-title{font-weight:700;margin-bottom:6px}
.ai-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.ai-chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s}
.ai-chip:active{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.ai-change-key{background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;display:block;margin-top:4px}

        {code:'SU',cat:'ex-lower',name:'Step Up with Knee Drive',sets:3,reps:'10/side',rest:'75s',cue:'Step onto box, drive opposite knee up to hip height at top. Running high-knee position. Drive through front heel — DO NOT push off back foot. Single-leg power + balance + running pattern.'},
        {code:'WL',cat:'ex-lower',name:'Reverse Lunge (DB)',sets:2,reps:'10/side',rest:'60s',cue:'Superset with Step Up. Step BACK — significantly less tibial stress than forward lunge. 3-sec descent. Mirrors running stride loading pattern.'},
      ]},
      {label:'C — Power Finishers',clr:'clr-blue',note:'Full-body power — develops explosive hip drive for running speed',rptLabel:'2–3 sets',exercises:[
        {code:'XB',cat:'ex-upper',name:'Single Arm Bench Press',sets:3,reps:'8/side',rest:'60s',cue:'One DB pressed at a time. Forces anti-rotation core engagement — your core works as hard as your chest. Harder than it looks. Deep core + chest + shoulder in one movement.'},
        {code:'TS',cat:'ex-full',name:'Thruster (DB or Barbell)',sets:2,reps:'8–10',rest:'90s',cue:'Squat to front rack, then explosive overhead press at the top. Full-body power endurance. Hip extension drives into the press — same hip power pattern as pushing off in your running stride.'},
        {code:'FC',cat:'ex-full',name:"Farmer's Carry",sets:2,reps:'30m',rest:'60s',cue:'Heavy DBs at sides. Tall posture, core braced hard, zero lateral sway. Develops the anti-sway stability that keeps your form clean in miles 20–26. If this feels easy, go heavier.'},
      ]},
      {label:'D — Deep Core',clr:'clr-purple',note:'Runna deep core — lateral, rotational, anti-rotation. 3 rounds.',rptLabel:'3 rounds',exercises:[
        {code:'CO',cat:'ex-core',name:'Long Lever Copenhagen Plank',sets:3,reps:'30s/side',rest:'30s',cue:'Side plank with TOP FOOT (not knee) elevated on bench — long lever. Much harder than standard Copenhagen. Adductor + lateral core strength reduces tibial bending moment during running. Progress to 45 sec.'},
        {code:'RT',cat:'ex-core',name:'Russian Twist',sets:3,reps:'20',rest:'30s',cue:'Feet elevated. Hold plate or DB. Rotate fully side to side. Oblique + rotational core. Deep abdominal strength for trunk stability during long efforts.'},
        {code:'PL',cat:'ex-core',name:'Side Plank Leg Raise',sets:3,reps:'30s/side',rest:'30s',cue:'Side plank on forearm. Raise top leg to hip height, hold or pulse. Lateral core + glute med + hip abductor. Directly targets the muscles that prevent hip drop in running — hip drop = tibial torsion.'},
        {code:'SN',cat:'ex-core',name:'Standing Side Bend',sets:2,reps:'15/side',rest:'30s',cue:'Hold DB in one hand. Bend directly to that side. Feel the OPPOSITE oblique work eccentrically. Lateral core and quadratus lumborum — the lateral stabilizers that keep you upright across the race distance.'},
      ]},
      {label:'E — Shin + Tibial Protocol',clr:'clr-orange',note:'Permanent — never remove. Builds the strong shins you need.',rptLabel:'',exercises:[
        {code:'LC',cat:'ex-pt',name:'Loaded Walking Calf Raises',sets:3,reps:'20 steps',rest:'45s',cue:'Hold DBs at sides. Rise fully onto toes on every step. Walk 20 steps. Combines calf load with movement — builds strength the way running actually uses it. Great tibial rehab from Runna.'},
        {code:'EC',cat:'ex-pt',name:'Eccentric Single Leg Calf Raise',sets:3,reps:'12/side',rest:'60s',cue:'⚠️ TIBIAL PROTOCOL: 4-sec slow descent on one leg. Loads soleus, reduces tibial stress. PERMANENT.'},
      ]},
    ],
    cooldown:[]
  }
};

const DAY_CONFIG = {
  0: {type:'recovery'},
  1: {type:'run_upper', liftKey:'FB_TUE', runDay:true, runLabel:'Zone 2 / Quality Run'},
  2: {type:'legs_xt', liftKey:'UPPER'},
  3: {type:'run_upper', liftKey:'FB_THU', runDay:true, runLabel:'Quality / Zone 2 Run'},
  4: {type:'legs_xt', liftKey:'UPPER'},
  5: {type:'run_upper', liftKey:'FB_TUE', runDay:true, runLabel:'Zone 2 Run'},
  6: {type:'long_run', runDay:true, runLabel:'Long Run'},
};

/* ─── STATE ─── */
let selectedDate = new Date();
selectedDate.setHours(0,0,0,0);
const today = new Date();
today.setHours(0,0,0,0);
let completedExercises = JSON.parse(localStorage.getItem('completed') || '{}');
let completedWorkouts = JSON.parse(localStorage.getItem('completedWorkouts') || '{}');

/* ─── HELPERS ─── */
function dateStr(d){return d.toISOString().split('T')[0]}
function formatDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function dayDiff(a,b){return Math.round((b-a)/(1000*60*60*24))}
function getCurrentPhase(){
  const ds=dateStr(today);
  for(const p of PHASES){if(ds>=p.start&&ds<=p.end)return p;}
  return PHASES[PHASES.length-1];
}
function getPhaseProgress(){
  const phase=getCurrentPhase();
  if(!phase||phase.status==='upcoming')return 0;
  const start=new Date(phase.start+'T00:00:00');
  const end=new Date(phase.end+'T00:00:00');
  const total=end-start;
  const elapsed=today-start;
  return Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
}
function getWeekLabel(d){
  const ds=dateStr(d);
  if(ds>='2026-05-04'&&ds<'2026-07-07')return 'Phase 1 · Volume Build';
  if(ds>='2026-07-07'&&ds<'2026-08-18')return 'Phase 2 · Intensity Build';
  if(ds>='2026-08-18'&&ds<'2026-09-22')return 'Phase 3 · Marathon Specific';
  if(ds>='2026-09-22'&&ds<'2026-11-02')return 'Phase 4 · Taper';
  if(ds>='2026-11-01')return 'NYC Marathon 2026';
  return 'NYC Marathon Training';
}
function checkMark(){
  return `<svg viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6.5L5.5 10L11 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

/* ─── TIMERS ─── */
let wTimerInterval=null,wTimerSeconds=0,wTimerRunning=false;
const setTimers={};
function wTimerFmt(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function wTimerToggle(){
  if(wTimerRunning){
    clearInterval(wTimerInterval);wTimerRunning=false;
  }else{
    wTimerInterval=setInterval(()=>{
      wTimerSeconds++;
      const el=document.getElementById('wtimer-display');
      if(el)el.textContent=wTimerFmt(wTimerSeconds);
    },1000);
    wTimerRunning=true;
  }
  const card=document.getElementById('workout-timer-card');
  if(card)card.classList.toggle('wtimer-running',wTimerRunning);
  const btn=document.getElementById('wtimer-toggle-btn');
  if(btn){btn.textContent=wTimerRunning?'Pause':'Start';btn.className='wtimer-btn '+(wTimerRunning?'pause':'start');}
}
function wTimerReset(){
  clearInterval(wTimerInterval);wTimerRunning=false;wTimerSeconds=0;
  const el=document.getElementById('wtimer-display');if(el)el.textContent='00:00';
  const card=document.getElementById('workout-timer-card');if(card)card.classList.remove('wtimer-running');
  const btn=document.getElementById('wtimer-toggle-btn');if(btn){btn.textContent='Start';btn.className='wtimer-btn start';}
}
function restoreWorkoutTimerState(){
  const el=document.getElementById('wtimer-display');if(!el)return;
  el.textContent=wTimerFmt(wTimerSeconds);
  const card=document.getElementById('workout-timer-card');if(card)card.classList.toggle('wtimer-running',wTimerRunning);
  const btn=document.getElementById('wtimer-toggle-btn');
  if(btn){btn.textContent=wTimerRunning?'Pause':'Start';btn.className='wtimer-btn '+(wTimerRunning?'pause':'start');}
}
function renderWorkoutTimer(){
  return `<div class="workout-timer-card" id="workout-timer-card">
    <div class="wtimer-icon">⏱</div>
    <div class="wtimer-info">
      <div class="wtimer-label">Workout Timer</div>
      <div class="wtimer-time" id="wtimer-display">00:00</div>
    </div>
    <div class="wtimer-btns">
      <button class="wtimer-btn start" id="wtimer-toggle-btn" onclick="wTimerToggle()">Start</button>
      <button class="wtimer-btn reset" onclick="wTimerReset()">Reset</button>
    </div>
  </div>`;
}
function parseSetDuration(reps){
  const m=(reps||'').match(/(\d+)\s*(?:sec(?:onds?)?|s(?=\/|\s|$))/i);
  return m?parseInt(m[1],10):null;
}
function startSetTimer(key,seconds){
  if(setTimers[key]&&setTimers[key].interval)clearInterval(setTimers[key].interval);
  setTimers[key]={total:seconds,remaining:seconds,interval:null};
  const popup=document.getElementById('stp-'+key);const btn=document.getElementById('stb-'+key);
  if(popup)popup.classList.add('visible');if(btn)btn.classList.add('active');
  updateSetTimerDisplay(key);
  setTimers[key].interval=setInterval(()=>{
    setTimers[key].remaining--;
    updateSetTimerDisplay(key);
    if(setTimers[key].remaining<=0){
      clearInterval(setTimers[key].interval);setTimers[key].interval=null;
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      const cd=document.getElementById('stc-'+key);if(cd){cd.textContent='Done!';cd.className='set-timer-countdown done';}
      const b=document.getElementById('stb-'+key);if(b){b.textContent='⏱';b.classList.remove('active');}
    }
  },1000);
}
function updateSetTimerDisplay(key){
  const t=setTimers[key];if(!t)return;
  const cd=document.getElementById('stc-'+key);const bar=document.getElementById('stbar-'+key);
  const pct=t.remaining/t.total*100;
  if(cd){cd.textContent=t.remaining+'s';cd.className='set-timer-countdown'+(t.remaining<=5?' low':'');}
  if(bar){bar.style.width=pct+'%';bar.className='set-timer-bar'+(t.remaining<=5?' low':'');}
}
function cancelSetTimer(key){
  if(setTimers[key]&&setTimers[key].interval)clearInterval(setTimers[key].interval);
  delete setTimers[key];
  const popup=document.getElementById('stp-'+key);const btn=document.getElementById('stb-'+key);
  if(popup)popup.classList.remove('visible');
  if(btn){btn.textContent='⏱';btn.classList.remove('active');}
}

/* ─── RENDER ─── */
function renderHeader(){
  const phase=getCurrentPhase();
  const phaseLabel=phase?`Phase ${phase.id} · ${phase.shortName}`:'NYC Training';
  document.getElementById('phase-chip').textContent=phaseLabel;
  document.getElementById('marathon-days').textContent=dayDiff(today,MARATHON_DATE);
  const isToday=dateStr(selectedDate)===dateStr(today);
  document.getElementById('date-line').textContent=isToday?
    'Today · '+today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):
    formatDate(selectedDate);
}

function renderDayStrip(){
  const strip=document.getElementById('day-strip');
  strip.innerHTML='';
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const startDay=new Date(today);
  startDay.setDate(startDay.getDate()-3);
  for(let i=0;i<14;i++){
    const d=new Date(startDay);
    d.setDate(startDay.getDate()+i);
    const dow=d.getDay();
    const config=DAY_CONFIG[dow];
    const ds=dateStr(d);
    const isToday=ds===dateStr(today);
    const isSelected=ds===dateStr(selectedDate);
    const btn=document.createElement('div');
    btn.className='day-btn'+(isSelected?' active':'')+(isToday&&!isSelected?' today':'')+(config.type==='recovery'?' rest-day':'');
    let dots='';
    if(config.type==='recovery'){dots='<div class="dot rest"></div>';}
    else if(config.type==='long_run'){dots='<div class="dot run"></div>';}
    else if(config.type==='legs_xt'){dots='<div class="dot lift"></div><div class="dot bike"></div>';}
    else{dots='<div class="dot run"></div><div class="dot lift"></div>';}
    btn.innerHTML=`<span class="day-name">${days[dow]}</span><span class="day-num">${d.getDate()}</span><div class="day-dots">${dots}</div>`;
    btn.onclick=()=>selectDay(d);
    strip.appendChild(btn);
  }
  setTimeout(()=>{
    const active=strip.querySelector('.active,.today');
    if(active)active.scrollIntoView({inline:'center',behavior:'smooth'});
  },50);
}

function selectDay(d){
  selectedDate=new Date(d);
  selectedDate.setHours(0,0,0,0);
  renderDayStrip();
  renderHeader();
  renderTodayView();
}

function catClass(cat){
  // cat comes as 'ex-pt', 'ex-lower', etc — strip 'ex-' for icon wrap class
  return 'cat-'+cat.replace('ex-','');
}

function renderExercise(ex, workoutKey, blockIdx, exIdx, isWarmup=false){
  const key=`${workoutKey}_${isWarmup?'w':blockIdx}_${exIdx}`;
  const done=completedExercises[key]||false;
  const icon=getExIcon(ex.code,ex.cat);
  const detail=`${isWarmup?'':ex.sets+'× '}${ex.reps}${ex.rest&&ex.rest!=='—'?' · Rest '+ex.rest:''}`;
  const isWarning=ex.cue&&ex.cue.startsWith('⚠️');
  const secs=parseSetDuration(ex.reps);
  const timerBtn=secs?`<button class="set-timer-btn" id="stb-${key}" onclick="startSetTimer('${key}',${secs})">⏱</button>`:'';
  const timerPopup=secs?`<div class="set-timer-popup" id="stp-${key}">
      <div class="set-timer-countdown" id="stc-${key}">${secs}s</div>
      <div class="set-timer-bar-wrap"><div class="set-timer-bar" id="stbar-${key}" style="width:100%"></div></div>
      <button class="set-cancel-btn" onclick="cancelSetTimer('${key}')">✕</button>
    </div>`:'';
  return `
  <div class="exercise-row ${catClass(ex.cat)}" id="ex-${key}">
    <div class="exercise-info">
      <div class="exercise-name">${ex.name}${timerBtn}</div>
      <div class="exercise-detail">${detail}</div>
      ${ex.cue?`<div class="cue-text ${isWarning?'cue-warning':''}">${ex.cue}</div>`:''}
      ${timerPopup}
    </div>
    <div class="exercise-check ${done?'done':''}" onclick="toggleEx('${key}',this)">${checkMark()}</div>
  </div>`;
}

function renderLiftCard(liftKey, dateStr_val){
  const lift=LIFTS[liftKey];
  const workoutKey=`${dateStr_val}_${liftKey}`;
  const done=completedWorkouts[workoutKey]||false;

  let warmupHtml='';
  if(lift.warmup&&lift.warmup.length){
    warmupHtml=`
    <div class="block-section">
      <div class="block-section-header clr-gray">
        <span class="block-part-name">Warm-Up</span>
      </div>
      <div class="block-section-body">
        <div class="exercise-list">`;
    lift.warmup.forEach((ex,i)=>{warmupHtml+=renderExercise(ex,workoutKey,-1,i,true);});
    warmupHtml+='</div></div></div>';
  }

  let blocksHtml='';
  lift.blocks.forEach((block,bi)=>{
    const dashIdx=block.label.indexOf(' — ');
    const partLetter=dashIdx>-1?block.label.slice(0,dashIdx):'';
    const partTitle=dashIdx>-1?block.label.slice(dashIdx+3):block.label;
    const partLabel=partLetter?`Part ${partLetter}`:'';
    blocksHtml+=`
    <div class="block-section">
      <div class="block-section-header ${block.clr}">
        <div class="block-header-meta">
          ${partLabel?`<span class="block-part-label">${partLabel}</span>`:''}
          <span class="block-part-name">${partTitle}</span>
        </div>
        ${block.rptLabel?`<span class="block-repeat-badge">${block.rptLabel}</span>`:''}
      </div>
      <div class="block-section-body">
        ${block.note?`<div class="block-desc">${block.note}</div>`:''}
        <div class="exercise-list">`;
    block.exercises.forEach((ex,ei)=>{blocksHtml+=renderExercise(ex,workoutKey,bi,ei);});
    blocksHtml+='</div></div></div>';
  });

  let cooldownHtml='';
  if(lift.cooldown&&lift.cooldown.length){
    cooldownHtml=`
    <div class="block-section">
      <div class="block-section-header clr-gray">
        <span class="block-part-name">Cool-Down</span>
      </div>
      <div class="block-section-body"><div class="exercise-list">`;
    lift.cooldown.forEach((ex,i)=>{cooldownHtml+=renderExercise(ex,workoutKey,99,i);});
    cooldownHtml+='</div></div></div>';
  }

  return `
  <div class="workout-card" id="lift-card-${workoutKey}">
    <div class="card-header" onclick="toggleCard('lift-card-${workoutKey}')">
      <div class="card-meta">
        <div class="card-title">${lift.name}</div>
        <div class="card-sub">${lift.focus}</div>
      </div>
      <div class="card-chevron">›</div>
    </div>
    <div class="card-body">
      ${warmupHtml}${blocksHtml}${cooldownHtml}
      <button class="complete-btn ${done?'done':'not-done'}" onclick="toggleWorkout('${workoutKey}',this)">
        ${done?'✓ Completed':'Mark Complete'}
      </button>
    </div>
  </div>`;
}

function runTypeLabel(type){
  if(type==='tempo')return 'Tempo Run';
  if(type==='track')return 'Track Session';
  if(type==='long')return 'Long Run';
  if(type==='long_mp')return 'Long Run + MP';
  if(type==='race')return 'NYC MARATHON';
  return 'Zone 2 Run';
}
function runTypeColor(type){
  if(type==='tempo')return '#F4831F';
  if(type==='track')return '#E63946';
  if(type==='long'||type==='long_mp')return '#7B2FBE';
  if(type==='race')return '#00A878';
  return '#00A878';
}

function renderRunCard(dateStr_val){
  const run=getRunWorkout(dateStr_val);
  const workoutKey=`${dateStr_val}_run`;
  const done=completedWorkouts[workoutKey]||false;
  if(run.type==='rest')return '';
  const color=runTypeColor(run.type);
  let detailHtml=`<div class="run-detail"><h4>${runTypeLabel(run.type)}</h4>`;
  detailHtml+=`<div class="run-row"><span class="run-key">Duration</span><span class="run-val">${run.duration}</span></div>`;
  detailHtml+=`<div class="run-row"><span class="run-key">Effort</span><span class="run-val">${run.effort}</span></div>`;
  detailHtml+=`<div class="run-row"><span class="run-key">Pace</span><span class="run-val">${run.pace}</span></div>`;
  if(run.sets)detailHtml+=`<div class="run-row"><span class="run-key">Structure</span><span class="run-val">${run.sets}</span></div>`;
  if(run.mp_segment)detailHtml+=`<div class="run-row"><span class="run-key">MP Segment</span><span class="run-val">${run.mp_segment}</span></div>`;
  detailHtml+=`<div class="run-row"><span class="run-key">Cadence</span><span class="run-val">170–180 steps/min</span></div>`;

  return `
  <div class="workout-card" id="run-card-${workoutKey}">
    <div class="card-header" onclick="toggleCard('run-card-${workoutKey}')">
      <div class="card-meta">
        <div class="card-title">${runTypeLabel(run.type)}</div>
        <div class="card-sub">${run.label} · ${run.duration}</div>
      </div>
      <div class="card-chevron">›</div>
    </div>
    <div class="card-body">
      ${detailHtml}
      <p style="font-size:13px;color:var(--text-muted);margin-top:10px;line-height:1.5">${run.notes}</p>
      <div class="pain-zone-guide" style="margin-top:12px">
        <div class="pain-zone pz-green"><div class="pz-dot"></div><div class="pz-text"><strong>0–2/10</strong> — Proceed normally</div></div>
        <div class="pain-zone pz-yellow"><div class="pz-dot"></div><div class="pz-text"><strong>2–4/10 intermittent</strong> — Caution, log it, repeat week if needed</div></div>
        <div class="pain-zone pz-orange"><div class="pz-dot"></div><div class="pz-text"><strong>4+</strong> — Stop. Contact Dr. Best before next run</div></div>
      </div>
      <button class="complete-btn ${done?'done':'not-done'}" onclick="toggleWorkout('${workoutKey}',this)">

}

function renderTodayView(){
  const ds=dateStr(selectedDate);
  const dow=selectedDate.getDay();
  const config=DAY_CONFIG[dow];
  const view=document.getElementById('view-today');
  let html='';

  if(config.type==='recovery'){
    html+=`
    <div class="rest-card">
      <div class="rest-emoji">🏊</div>
      <h3>Active Recovery</h3>
      <p>Easy swim, yoga, or Pilates + walk 30 min. ~1.5–2 hrs. Sunday is non-negotiable rest from structured training. Bone remodeling is most active during rest and sleep.</p>
    </div>`;
  }else if(config.type==='long_run'){
    const run=getRunWorkout(ds);
    html+=renderWorkoutTimer();
    html+=`<div class="section-label">Today's Workouts</div>`;
    if(run.type==='rest'){
      html+=`<div class="rest-card"><div class="rest-emoji">💤</div><h3>${run.label}</h3><p>${run.notes}</p></div>`;
    }else{
      html+=renderRunCard(ds);
    }
  }else if(config.type==='legs_xt'){
    html+=renderWorkoutTimer();
    html+=`<div class="section-label">Today's Workouts</div>`;
    html+=renderLiftCard(config.liftKey,ds);
    html+=renderXTCard(ds);
  }else{
    // run_upper
    const run=getRunWorkout(ds);
    html+=renderWorkoutTimer();
    html+=`<div class="section-label">Today's Workouts</div>`;
    if(run.type==='rest'){
      html+=`<div class="rest-card"><div class="rest-emoji">💤</div><h3>${run.label}</h3><p>${run.notes}</p></div>`;
    }else{
      html+=renderRunCard(ds);
      html+=renderLiftCard(config.liftKey,ds);
    }
  }

  html+=`<div class="section-label">Plan Progress</div>`;
  html+=renderPhaseProgress();
  view.innerHTML=html;
  restoreWorkoutTimerState();
}

function renderPhaseProgress(){
  const pct=getPhaseProgress();

let aiHistory = [];
let aiTyping = false;
let aiKey = localStorage.getItem('aiKey') || '';

function buildWorkoutContext() {
  const ds = dateStr(selectedDate);
  const dow = selectedDate.getDay();
  const cfg = DAY_CONFIG[dow];
  const lines = [`Date: ${formatDate(selectedDate)}`];

  if (cfg.runDay) {
    const run = getRunWorkout(ds);
    if (run && run.type !== 'rest') {
      lines.push(`\nRUN: ${run.label}`);
      lines.push(`  Duration: ${run.duration}`);
      lines.push(`  Effort: ${run.effort}${run.pace ? ' · ' + run.pace : ''}`);
      if (run.sets) lines.push(`  Structure: ${run.sets}`);
    }
  }

  if (cfg.liftKey && LIFTS[cfg.liftKey]) {
    const lift = LIFTS[cfg.liftKey];
    lines.push(`\nLIFT: ${lift.name}`);
    lift.blocks.forEach(b => {
      lines.push(`\n  ${b.label}:`);
      b.exercises.forEach(e => {
        lines.push(`    - ${e.name}: ${e.sets} × ${e.reps}${e.rest && e.rest !== '—' ? ' (rest ' + e.rest + ')' : ''}`);
      });
    });
  }

  if (cfg.type === 'legs_xt') {
    const xt = getXTWorkout(ds);
    lines.push(`\nCROSS-TRAINING: ${xt.label} — ${xt.duration}`);
  }

  if (cfg.type === 'recovery') lines.push('\nRest day.');
  return lines.join('\n');
}

function buildSystemPrompt() {
  return `You are Amanda's personal running coach and strength trainer — concise, warm, practical.

AMANDA'S CONTEXT:
- Recovering from bilateral tibial stress reaction (both legs)
- Femoral neck bone density concern
- NEVER suggest: box jumps, plyometrics, forward lunges, high tibial-impact moves
- ALWAYS keep: Eccentric Calf Raises, Copenhagen Plank, Tibial Wall Pumps, femoral neck protocol (Cable Hip Abduction + SL Glute Bridge first in compound sessions)
- Safe: reverse lunges, Bulgarian split squats, hip-dominant moves, cable work, dumbbells, bands

TODAY'S WORKOUT:
${buildWorkoutContext()}

RESPONSE STYLE:
- She's at the gym reading on her phone — be concise and specific
- Give exact swaps: exercise name, sets × reps
- Equipment swaps: suggest dumbbell/band/cable/bodyweight alternatives
- Soreness: suggest load reduction or pattern changes (e.g. sore lower back → swap RDL for SL Glute Bridge)
- Targeting: add 1–2 exercises or shift block emphasis
- No markdown tables or bullet symbols — use plain text
- End with one short encouraging line`;
}

function openAIChat() {
  const panel = document.getElementById('ai-panel');
  panel.classList.add('open');
  document.getElementById('ai-panel-sub').textContent = formatDate(selectedDate);

  if (!aiKey) {
    document.getElementById('ai-key-setup').style.display = 'flex';
    document.getElementById('ai-input-row').style.display = 'none';
  } else if (aiHistory.length === 0) {
    document.getElementById('ai-key-setup').style.display = 'none';
    document.getElementById('ai-input-row').style.display = 'flex';
    showWelcome();
    setTimeout(() => document.getElementById('ai-input').focus(), 400);
  } else {
    setTimeout(() => document.getElementById('ai-input').focus(), 400);
  }
}

function closeAIChat() {
  document.getElementById('ai-panel').classList.remove('open');
}

function saveApiKey() {
  const k = document.getElementById('ai-key-input').value.trim();
  if (!k.startsWith('sk-ant-')) {
    alert('Please enter a valid Claude API key (starts with sk-ant-)');
    return;
  }
  aiKey = k;
  localStorage.setItem('aiKey', k);
  document.getElementById('ai-key-setup').style.display = 'none';
  document.getElementById('ai-input-row').style.display = 'flex';
  showWelcome();
  setTimeout(() => document.getElementById('ai-input').focus(), 200);
}

function showWelcome() {
  const msgs = document.getElementById('ai-messages');
  msgs.innerHTML = `<div class="ai-welcome">
    <div class="ai-welcome-title">Hey Amanda ✦</div>
    <div>Tell me what's going on and I'll adjust today's session — equipment, how you're feeling, what you want to work on.</div>

function useChip(btn) {
  document.getElementById('ai-input').value = btn.textContent;
  sendAIMessage();
}

function resetApiKey() {
  aiKey = '';
  aiHistory = [];
  localStorage.removeItem('aiKey');
  document.getElementById('ai-messages').innerHTML = '';
  document.getElementById('ai-key-setup').style.display = 'flex';
  document.getElementById('ai-input-row').style.display = 'none';
  document.getElementById('ai-key-input').value = '';
}

function addBubble(role, text) {
  const msgs = document.getElementById('ai-messages');
  const el = document.createElement('div');
  el.className = 'ai-msg ' + (role === 'user' ? 'ai-msg-user' : 'ai-msg-ai');
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('ai-messages');
  const el = document.createElement('div');
  el.id = 'ai-thinking-indicator';
  el.className = 'ai-thinking';
  el.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function clearThinking() {
  const el = document.getElementById('ai-thinking-indicator');
  if (el) el.remove();
}

async function sendAIMessage() {
  if (aiTyping) return;
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addBubble('user', text);
  aiHistory.push({ role: 'user', content: text });

  aiTyping = true;
  document.getElementById('ai-send').disabled = true;
  showThinking();

  try {
    const reply = await callClaude(aiHistory);
    clearThinking();
    addBubble('assistant', reply);
    aiHistory.push({ role: 'assistant', content: reply });
  } catch(err) {
    clearThinking();
    const msg = err.message.includes('401')
      ? 'API key issue — tap "Change API key" below to update it.'
      : 'Something went wrong. Check your connection and try again.';
    addBubble('assistant', msg);
  }

  aiTyping = false;
  document.getElementById('ai-send').disabled = false;
  input.focus();
}

async function callClaude(messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': aiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-allow-browser': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      system: buildSystemPrompt(),
      messages
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(res.status + ': ' + (e.error?.message || 'API error'));
  }
  const data = await res.json();
  return data.content[0].text;
}
